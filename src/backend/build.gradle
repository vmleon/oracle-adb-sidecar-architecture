plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.3'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'dev.victormartin.adbsidecar'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(23)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'

    runtimeOnly 'com.oracle.database.jdbc:ojdbc11:23.9.0.25.07'
    // Pulls oraclepki + osdt_core + osdt_cert transitively — needed so
    // ojdbc11 can read the SSO wallet (cwallet.sso). Without it we hit
    // "NoSuchAlgorithmException: SSO KeyStore not available".
    implementation 'com.oracle.database.spring:oracle-spring-boot-starter-wallet:26.1.0'
    runtimeOnly 'org.postgresql:postgresql'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

bootJar {
    archiveFileName = "backend-${version}.jar"
}

tasks.named('test') {
    useJUnitPlatform()
}
