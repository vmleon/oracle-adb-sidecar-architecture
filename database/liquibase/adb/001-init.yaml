databaseChangeLog:
  - changeSet:
      id: adb-001-create-deployment-marker
      author: adbsidecar
      changes:
        - createTable:
            tableName: deployment_marker
            columns:
              - column:
                  name: id
                  type: NUMBER(10)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: source
                  type: VARCHAR2(64)
                  defaultValue: liquibase
