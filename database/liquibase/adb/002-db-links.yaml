databaseChangeLog:
  # --- Oracle Free 26ai (homogeneous link) ---

  - changeSet:
      id: adb-002-cred-orafree
      author: adbsidecar
      changes:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN
                BEGIN DBMS_CLOUD.DROP_CREDENTIAL('ORAFREE_CRED'); EXCEPTION WHEN OTHERS THEN NULL; END;
                DBMS_CLOUD.CREATE_CREDENTIAL(
                  credential_name => 'ORAFREE_CRED',
                  username        => 'SYSTEM',
                  password        => '${oracle_db_password}'
                );
              END;
              /
      rollback:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN DBMS_CLOUD.DROP_CREDENTIAL('ORAFREE_CRED'); END;
              /

  - changeSet:
      id: adb-002-link-orafree
      author: adbsidecar
      changes:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN
                BEGIN DBMS_CLOUD_ADMIN.DROP_DATABASE_LINK('ORAFREE_LINK'); EXCEPTION WHEN OTHERS THEN NULL; END;
                DBMS_CLOUD_ADMIN.CREATE_DATABASE_LINK(
                  db_link_name    => 'ORAFREE_LINK',
                  hostname        => '${databases_fqdn}',
                  port            => 1521,
                  service_name    => 'FREEPDB1',
                  ssl_server_cert_dn => NULL,
                  credential_name => 'ORAFREE_CRED',
                  directory_name  => NULL,
                  public_link     => FALSE,
                  private_target  => TRUE
                );
              END;
              /
      rollback:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN DBMS_CLOUD_ADMIN.DROP_DATABASE_LINK('ORAFREE_LINK'); END;
              /

  - changeSet:
      id: adb-002-view-accounts
      author: adbsidecar
      changes:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              CREATE OR REPLACE VIEW V_ACCOUNTS AS
              SELECT id, customer_name, balance
              FROM accounts@ORAFREE_LINK
              /
      rollback:
        - sql:
            sql: DROP VIEW V_ACCOUNTS

  - changeSet:
      id: adb-002-view-transactions
      author: adbsidecar
      changes:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              CREATE OR REPLACE VIEW V_TRANSACTIONS AS
              SELECT id, account_id, amount, tx_date
              FROM transactions@ORAFREE_LINK
              /
      rollback:
        - sql:
            sql: DROP VIEW V_TRANSACTIONS

  # PostgreSQL 18 is intentionally NOT linked.
  # See docs/ISSUE_AI_AGENT_RUN_TEAM_PG_LINK_WEDGE.md — on this ADB build
  # DBMS_CLOUD_AI_AGENT.RUN_TEAM enumerates every entry in USER_DB_LINKS
  # at task warm-up and cannot enumerate PG_LINK, which durably wedges
  # every team in the schema. PG_CRED + PG_LINK + V_POLICIES + V_RULES
  # were therefore removed from this changelog. The Postgres engine
  # remains reachable directly via postgresJdbc and via route=direct.

  # --- MongoDB 8 (heterogeneous link) ---

  - changeSet:
      id: adb-002-cred-mongo
      author: adbsidecar
      changes:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN
                BEGIN DBMS_CLOUD.DROP_CREDENTIAL('MONGO_CRED'); EXCEPTION WHEN OTHERS THEN NULL; END;
                DBMS_CLOUD.CREATE_CREDENTIAL(
                  credential_name => 'MONGO_CRED',
                  username        => 'admin',
                  password        => '${mongo_db_password}'
                );
              END;
              /
      rollback:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN DBMS_CLOUD.DROP_CREDENTIAL('MONGO_CRED'); END;
              /

  - changeSet:
      id: adb-002-link-mongo
      author: adbsidecar
      changes:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN
                BEGIN DBMS_CLOUD_ADMIN.DROP_DATABASE_LINK('MONGO_LINK'); EXCEPTION WHEN OTHERS THEN NULL; END;
                DBMS_CLOUD_ADMIN.CREATE_DATABASE_LINK(
                  db_link_name    => 'MONGO_LINK',
                  hostname        => '${databases_fqdn}',
                  port            => 27017,
                  service_name    => 'banking',
                  ssl_server_cert_dn => NULL,
                  credential_name => 'MONGO_CRED',
                  gateway_params  => JSON_OBJECT('db_type' VALUE 'mongodb'),
                  public_link     => FALSE,
                  private_target  => TRUE
                );
              END;
              /
      rollback:
        - sql:
            endDelimiter: "/"
            splitStatements: false
            sql: |
              BEGIN DBMS_CLOUD_ADMIN.DROP_DATABASE_LINK('MONGO_LINK'); END;
              /

  # V_SUPPORT_TICKETS is intentionally NOT created.
  # See docs/ISSUE_ADB_HETEROGENEOUS_MONGODB_OBJECT_NOT_FOUND.md — every
  # SELECT through MONGO_LINK fails with ORA-28500 "object not found"
  # inside ADB's managed heterogeneous-gateway / DataDirect ODBC driver,
  # independent of collection placement, service_name, MongoDB version,
  # or user role. MONGO_CRED + MONGO_LINK remain above so the
  # infrastructure stays in place for re-testing after any ADB update.
