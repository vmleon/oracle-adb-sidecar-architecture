---
- name: Install podman
  ansible.builtin.dnf:
    name:
      - podman
      - podman-docker
    update_cache: yes

- name: Create persistent data directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0770'
  loop:
    - { path: /data/oracle,   owner: 54321 }
    - { path: /data/postgres, owner: 999 }
    - { path: /data/mongo,    owner: 999 }

- name: Render Oracle container systemd unit
  ansible.builtin.template:
    src: files/oracle.service.j2
    dest: /etc/systemd/system/oracle.service
    mode: '0644'

- name: Render Postgres container systemd unit
  ansible.builtin.template:
    src: files/postgres.service.j2
    dest: /etc/systemd/system/postgres.service
    mode: '0644'

- name: Render Mongo container systemd unit
  ansible.builtin.template:
    src: files/mongo.service.j2
    dest: /etc/systemd/system/mongo.service
    mode: '0644'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Start container services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - oracle
    - postgres
    - mongo

- name: Disable firewalld
  ansible.builtin.service:
    name: firewalld
    state: stopped
    enabled: no
